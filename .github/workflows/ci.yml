name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run lint (ruff if available, else syntax check)
        run: |
          cd backend
          python -m py_compile app/rag/ingestion/models.py
          python -m py_compile app/rag/ingestion/parsers/base.py
          python -m py_compile app/rag/ingestion/chunkers/base.py
          python -m py_compile app/rag/ingestion/cleaners/noise_filter.py
          python -m py_compile app/rag/ingestion/cleaners/dedup.py
          python -m py_compile app/rag/ingestion/cleaners/pii_redactor.py
          python -m py_compile app/plugins/base.py
          python -m py_compile app/plugins/registry.py

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v \
            --cov=app.rag.ingestion \
            --cov=app.plugins \
            --cov-report=term-missing \
            --cov-report=html:coverage/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
